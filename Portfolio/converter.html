<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Converter | Akshara OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff00ff; --orange: #ff4500; --bg: #0d0118; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .back-btn { 
            position: fixed; top: 20px; left: 20px; color: var(--orange); 
            text-decoration: none; border: 2px solid var(--orange); 
            padding: 10px 20px; font-family: 'Orbitron'; font-size: 12px;
        }

        .card { 
            background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px; 
            border: 2px solid var(--pink); width: 400px; text-align: center; 
            backdrop-filter: blur(10px); box-shadow: 0 0 40px rgba(255, 0, 255, 0.2);
        }

        h2 { font-family: 'Orbitron'; color: var(--orange); margin-bottom: 25px; }
        
        input, select { 
            width: 100%; padding: 15px; margin: 10px 0; background: #000; 
            border: 1px solid var(--pink); color: white; font-family: 'Orbitron'; outline: none;
        }

        .convert-btn { 
            width: 100%; padding: 15px; background: var(--pink); color: white; 
            border: none; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; 
            margin-top: 15px; transition: 0.3s;
        }
        .convert-btn:hover { background: var(--orange); box-shadow: 0 0 20px var(--orange); }

        #result { 
            margin-top: 25px; font-family: 'Orbitron'; color: var(--orange); 
            font-size: 1.4rem; min-height: 35px;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">< BACK_TO_SYSTEM</a>

    <div class="card">
        <h2>THERMAL_CONVERTER</h2>
        <input type="text" id="valInput" placeholder="Enter Temperature">
        <select id="unitSelect">
            <option value="CtoF">Celsius to Fahrenheit</option>
            <option value="FtoC">Fahrenheit to Celsius</option>
            <option value="CtoK">Celsius to Kelvin</option>
        </select>
        <button class="convert-btn" onclick="convert()">CONVERT_NOW</button>
        <div id="result">---</div>
    </div>

    <script>
        function convert() {
            const input = document.getElementById('valInput').value;
            const unit = document.getElementById('unitSelect').value;
            const resultDiv = document.getElementById('result');

            if (isNaN(input) || input.trim() === "") {
                alert("CRITICAL ERROR: Please enter a valid numerical value.");
                return;
            }

            const num = parseFloat(input);
            let finalRes = "";

            if (unit === "CtoF") {
                finalRes = (num * 9/5 + 32).toFixed(2) + " °F";
            } else if (unit === "FtoC") {
                finalRes = ((num - 32) * 5/9).toFixed(2) + " °C";
            } else if (unit === "CtoK") {
                finalRes = (num + 273.15).toFixed(2) + " K";
            }

            resultDiv.innerText = finalRes;
        }
    </script>
</body>
</html>
