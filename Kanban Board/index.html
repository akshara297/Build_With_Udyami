<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>📋 My Project Board</h1>
    </header>

    <main class="board-container">
    <section class="column" id="to-do">
        <h2>To Do</h2>
        <div class="task-list" id="list-to-do"></div> <div class="add-task-container">
            <input type="text" placeholder="+ Add a task..." class="task-input">
            <button class="add-btn">Add</button>
        </div>
    </section>

    <section class="column" id="in-progress">
        <h2>In Progress</h2>
        <div class="task-list" id="list-in-progress"></div> <div class="add-task-container">
            <input type="text" placeholder="+ Add a task..." class="task-input">
            <button class="add-btn">Add</button>
        </div>
    </section>

    <section class="column" id="done">
        <h2>Done</h2>
        <div class="task-list" id="list-done"></div> <div class="add-task-container">
            <input type="text" placeholder="+ Add a task..." class="task-input">
            <button class="add-btn">Add</button>
        </div>
    </section>
</main>

    <script src="script.js"></script>
</body>
</html>
